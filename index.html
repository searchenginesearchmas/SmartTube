<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    background-color: cyan;
    margin: 0;
  }
  h1 {
    color: white;
    margin: 20px;
  }
  h3 {
    margin: 10px 0;
  }
  .video-grid {
    display: grid;
    grid-template-columns: 1fr; /* phones: one column */
    gap: 20px;
    padding: 20px;
  }
  .video-item video {
    width: 100%;
    height: auto;
    display: block;
  }
  /* tablets and up: two columns */
  @media (min-width: 768px) {
    .video-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  .search-box {
    margin: 20px;
    padding: 10px;
    width: calc(100% - 60px);
    font-size: 16px;
  }
</style>
<title>SmartTube</title>
</head>
<body>
  <h1>SmartTube</h1>
  <input type="text" id="search" class="search-box" placeholder="Search videos...">

  <div class="video-grid" id="videoGrid">
    <div class="video-item" data-keywords="Tears of Steel, Blender, VFX">
      <video src="https://dn710604.ca.archive.org/0/items/tearsofsteelblendervfxopenmovie800p/Tears%20of%20Steel%20-%20Blender%20VFX%20Open%20Movie%20800p.mp4" controls></video>
      <h3>Tears of Steel</h3>
    </div>
    <div class="video-item" data-keywords="Dog Fun, Puppy, Pet">
      <video src="istockphoto-2167958708-640_adpp_is.mp4" controls></video>
      <h3>Dog Fun</h3>
    </div>
    <div class="video-item" data-keywords="Big Buck Bunny, Animation, Cartoon">
      <video src="https://download.blender.org/peach/bigbuckbunny_movies/BigBuckBunny_640x360.m4v" controls></video>
      <h3>Big Buck Bunny</h3>
    </div>
    <div class="video-item" data-keywords="Playing with Cousin, Family, Kids">
      <video src="Screen Recording.mp4" controls></video>
      <h3>Playing with Cousin</h3>
    </div>
  </div>

<script>
  var searchInput = document.getElementById('search');
  var videoItems = document.getElementsByClassName('video-item');

  searchInput.onkeyup = function() {
    var query = searchInput.value.toLowerCase();
    for (var i = 0; i < videoItems.length; i++) {
      var keywords = videoItems[i].getAttribute('data-keywords').toLowerCase();
      if (keywords.indexOf(query) !== -1) {
        videoItems[i].style.display = 'block';
      } else {
        videoItems[i].style.display = 'none';
      }
    }
  };
</script>
</body>
</html>
